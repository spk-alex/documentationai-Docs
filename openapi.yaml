{
  "openapi": "3.1.0",
  "info": {
    "title": "SmartphoneKey B2C API",
    "version": "1.0.0",
    "description": "Event-sourced B2C API for SmartphoneKey smart lock management"
  },
  "servers": [
    {
      "url": "https://api.spkey.co",
      "description": "Production"
    },
    {
      "url": "https://b2c-api.spk-stage.workers.dev",
      "description": "Staging"
    },
    {
      "url": "https://b2c-api.spk-dev.workers.dev",
      "description": "Development"
    },
    {
      "url": "http://localhost:8787",
      "description": "Local"
    }
  ],
  "security": [
    {
      "BearerAuth": []
    },
    {
      "ApiKeyAuth": []
    }
  ],
  "components": {
    "securitySchemes": {
      "BearerAuth": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "JWT",
        "description": "JWT token from SmartphoneKey authentication. Identifies the B2C user or B2B service."
      },
      "ApiKeyAuth": {
        "type": "apiKey",
        "in": "header",
        "name": "X-API-Key",
        "description": "API key for B2B organization access. Provided during organization onboarding."
      }
    },
    "schemas": {},
    "parameters": {}
  },
  "paths": {
    "/locks/{id}/debug/messages": {
      "get": {
        "tags": [
          "Lock",
          "Query",
          "Debug"
        ],
        "summary": "Get MQTT debug messages",
        "description": "Get captured MQTT messages for a lock (used for smoke tests)",
        "operationId": "get_GetDebugMessagesRoute",
        "parameters": [
          {
            "schema": {
              "type": "integer",
              "exclusiveMinimum": 0,
              "description": "Lock ID (numeric)"
            },
            "required": true,
            "description": "Lock ID (numeric)",
            "name": "id",
            "in": "path"
          },
          {
            "schema": {
              "type": "string",
              "default": "50",
              "description": "Maximum number of messages to return"
            },
            "required": false,
            "description": "Maximum number of messages to return",
            "name": "limit",
            "in": "query"
          }
        ],
        "responses": {
          "200": {
            "description": "MQTT debug messages retrieved successfully",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "messages": {
                      "type": "object",
                      "properties": {
                        "command": {
                          "type": "array",
                          "items": {
                            "type": "object",
                            "properties": {
                              "id": {
                                "type": "number"
                              },
                              "payload": {},
                              "timestamp": {
                                "type": "string"
                              }
                            },
                            "required": [
                              "id",
                              "timestamp"
                            ]
                          }
                        },
                        "status": {
                          "type": "array",
                          "items": {
                            "type": "object",
                            "properties": {
                              "id": {
                                "type": "number"
                              },
                              "payload": {},
                              "timestamp": {
                                "type": "string"
                              }
                            },
                            "required": [
                              "id",
                              "timestamp"
                            ]
                          }
                        }
                      },
                      "required": [
                        "command",
                        "status"
                      ]
                    },
                    "total": {
                      "type": "number"
                    }
                  },
                  "required": [
                    "messages",
                    "total"
                  ]
                }
              }
            }
          },
          "500": {
            "description": "Internal server error",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "error": {
                      "type": "string"
                    }
                  },
                  "required": [
                    "error"
                  ]
                }
              }
            }
          }
        }
      }
    },
    "/admin/cleanup/users/{userId}": {
      "delete": {
        "tags": [
          "Admin",
          "Cleanup"
        ],
        "summary": "Delete user aggregate",
        "description": "Admin-only endpoint for deleting a user aggregate. Supports two modes: DELETE_DO_ONLY removes the Durable Object instance while preserving R2 events (the state will be restored on next access), and DELETE_DO_AND_EVENTS archives all events to a timestamped folder then permanently removes the DO instance and D1 entries. Requires dual authentication: X-Admin-API-Key header and a JWT with @smartphonekey.com email domain.",
        "operationId": "delete_DeleteUserRoute",
        "parameters": [
          {
            "schema": {
              "type": "string",
              "description": "User ID to delete"
            },
            "required": true,
            "description": "User ID to delete",
            "name": "userId",
            "in": "path"
          },
          {
            "schema": {
              "type": "string",
              "enum": [
                "DELETE_DO_ONLY",
                "DELETE_DO_AND_EVENTS"
              ],
              "description": "Deletion mode: DELETE_DO_ONLY preserves R2 events, DELETE_DO_AND_EVENTS archives and removes everything"
            },
            "required": true,
            "description": "Deletion mode: DELETE_DO_ONLY preserves R2 events, DELETE_DO_AND_EVENTS archives and removes everything",
            "name": "mode",
            "in": "query"
          }
        ],
        "responses": {
          "200": {
            "description": "User deleted successfully",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean"
                    },
                    "userId": {
                      "type": "string"
                    },
                    "mode": {
                      "type": "string"
                    },
                    "operations": {
                      "type": "array",
                      "items": {}
                    },
                    "deletionSummary": {
                      "type": "string"
                    },
                    "auditLogPath": {
                      "type": "string"
                    },
                    "duration": {
                      "type": "number"
                    },
                    "errors": {
                      "type": "array",
                      "items": {
                        "type": "string"
                      }
                    }
                  },
                  "required": [
                    "success",
                    "userId",
                    "mode",
                    "operations",
                    "auditLogPath",
                    "duration",
                    "errors"
                  ]
                }
              }
            }
          },
          "400": {
            "description": "Invalid mode parameter",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean"
                    },
                    "error": {
                      "type": "string"
                    }
                  },
                  "required": [
                    "success",
                    "error"
                  ]
                }
              }
            }
          },
          "401": {
            "description": "Missing or invalid authentication",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean"
                    },
                    "error": {
                      "type": "string"
                    },
                    "message": {
                      "type": "string"
                    }
                  },
                  "required": [
                    "success",
                    "error",
                    "message"
                  ]
                }
              }
            }
          },
          "500": {
            "description": "Internal server error",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean"
                    },
                    "error": {
                      "type": "string"
                    },
                    "message": {
                      "type": "string"
                    }
                  },
                  "required": [
                    "success",
                    "error",
                    "message"
                  ]
                }
              }
            }
          }
        }
      }
    },
    "/admin/cleanup/locks/{lockId}": {
      "delete": {
        "tags": [
          "Admin",
          "Cleanup"
        ],
        "summary": "Delete lock aggregate",
        "description": "Admin-only endpoint for deleting a lock aggregate. Supports two modes: DELETE_DO_ONLY removes the Durable Object instance while preserving R2 events (state restored on next access), and DELETE_DO_AND_EVENTS archives all events then permanently removes the DO instance and D1 entries. The cascadeDeleteKeys parameter controls whether associated key_assignments are also removed. Requires dual authentication: X-Admin-API-Key header and a JWT with @smartphonekey.com email domain.",
        "operationId": "delete_DeleteLockRoute",
        "parameters": [
          {
            "schema": {
              "type": "string",
              "description": "Lock ID (numeric) or UUID"
            },
            "required": true,
            "description": "Lock ID (numeric) or UUID",
            "name": "lockId",
            "in": "path"
          },
          {
            "schema": {
              "type": "string",
              "enum": [
                "DELETE_DO_ONLY",
                "DELETE_DO_AND_EVENTS"
              ],
              "description": "Deletion mode: DELETE_DO_ONLY preserves R2 events, DELETE_DO_AND_EVENTS archives and removes everything"
            },
            "required": true,
            "description": "Deletion mode: DELETE_DO_ONLY preserves R2 events, DELETE_DO_AND_EVENTS archives and removes everything",
            "name": "mode",
            "in": "query"
          },
          {
            "schema": {
              "type": "string",
              "default": "true",
              "description": "Whether to also delete associated key_assignments rows (default: true)"
            },
            "required": false,
            "description": "Whether to also delete associated key_assignments rows (default: true)",
            "name": "cascadeDeleteKeys",
            "in": "query"
          }
        ],
        "responses": {
          "200": {
