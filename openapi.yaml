                                  "type": "string",
                                  "enum": [
                                    "contact",
                                    "water_leak",
                                    "smoke"
                                  ]
                                },
                                "severity": {
                                  "type": "string",
                                  "enum": [
                                    "warning",
                                    "critical"
                                  ]
                                },
                                "matterPath": {
                                  "type": "string"
                                },
                                "deviceTypeId": {
                                  "type": "integer"
                                },
                                "rawValue": {
                                  "type": "number"
                                },
                                "timestamp": {
                                  "type": "string"
                                }
                              },
                              "required": [
                                "deviceId",
                                "channel",
                                "alarmType",
                                "severity",
                                "matterPath",
                                "timestamp"
                              ]
                            }
                          },
                          "required": [
                            "type",
                            "data"
                          ]
                        },
                        {
                          "type": "object",
