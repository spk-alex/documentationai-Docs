    "/admin/aggregates/{type}/{id}/events": {
      "get": {
        "tags": [
          "Admin",
          "Aggregates"
        ],
        "summary": "Browse an aggregate's R2 event stream (paginated, filterable)",
        "description": "Returns the ordered R2 event stream for an aggregate with version-range (fromVersion/toVersion) and event-type filters, forward cursor pagination, and the latest snapshot version. `type` accepts the canonical aggregate type (e.g. LockAggregate) or its slug (e.g. lock). Read-only; requires dual admin auth (X-Admin-API-Key + JWT). Audit-logged.",
        "security": [
          {
            "adminApiKey": [],
            "bearerAuth": []
          }
        ],
        "operationId": "get_GetAggregateEventsRoute",
        "parameters": [
          {
            "schema": {
              "type": "string",
              "description": "Aggregate type or slug, e.g. \"lock\" or \"LockAggregate\""
            },
            "required": true,
            "description": "Aggregate type or slug, e.g. \"lock\" or \"LockAggregate\"",
            "name": "type",
            "in": "path"
          },
          {
            "schema": {
              "type": "string",
              "description": "Aggregate id (== state.id used for DO routing)"
            },
            "required": true,
            "description": "Aggregate id (== state.id used for DO routing)",
            "name": "id",
            "in": "path"
          },
          {
            "schema": {
              "type": "integer",
              "minimum": 1,
              "description": "Only return events with version >= fromVersion (inclusive)."
            },
            "required": false,
            "description": "Only return events with version >= fromVersion (inclusive).",
            "name": "fromVersion",
            "in": "query"
          },
          {
            "schema": {
              "type": "integer",
              "minimum": 1,
              "description": "Only return events with version &lt;= toVersion (inclusive)."
            },
            "required": false,
            "description": "Only return events with version &lt;= toVersion (inclusive).",
            "name": "toVersion",
            "in": "query"
          },
          {
            "schema": {
              "type": "string",
              "description": "Only return events whose type matches this exact event-type string."
            },
            "required": false,
            "description": "Only return events whose type matches this exact event-type string.",
            "name": "type",
            "in": "query"
          },
          {
            "schema": {
              "type": "integer",
              "minimum": 1,
              "maximum": 500,
              "description": "Max events to return in this page (default 100)."
            },
            "required": false,
            "description": "Max events to return in this page (default 100).",
            "name": "limit",
            "in": "query"
          },
          {
            "schema": {
              "type": [
                "integer",
                "null"
              ],
              "minimum": 0,
              "description": "Pagination cursor: return events with version > cursor. Use nextCursor from the previous page."
            },
            "required": false,
            "description": "Pagination cursor: return events with version > cursor. Use nextCursor from the previous page.",
            "name": "cursor",
            "in": "query"
          }
        ],
        "responses": {
          "200": {
            "description": "Ordered event stream page",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "aggregateType": {
                      "type": "string"
                    },
                    "aggregateId": {
                      "type": "string"
                    },
                    "totalEvents": {
                      "type": "number"
                    },
                    "snapshot": {
                      "type": [
                        "object",
                        "null"
                      ],
                      "properties": {
                        "version": {
                          "type": "number"
                        },
                        "timestamp": {
                          "type": "string"
                        }
                      },
                      "required": [
                        "version",
                        "timestamp"
                      ]
                    },
                    "events": {
                      "type": "array",
                      "items": {
                        "type": "object",
                        "properties": {
                          "version": {
                            "type": "number"
                          },
                          "type": {
                            "type": "string"
                          },
                          "timestamp": {
                            "type": "string"
                          },
                          "orgId": {
                            "type": "string"
                          },
                          "event": {}
                        },
                        "required": [
                          "version",
                          "type",
                          "timestamp",
                          "orgId"
                        ]
                      }
                    },
                    "nextCursor": {
                      "type": [
                        "number",
                        "null"
                      ]
                    },
                    "filter": {
                      "type": "object",
                      "properties": {
                        "fromVersion": {
                          "type": [
                            "number",
                            "null"
                          ]
                        },
                        "toVersion": {
                          "type": [
                            "number",
                            "null"
                          ]
                        },
                        "type": {
                          "type": [
                            "string",
                            "null"
                          ]
                        }
                      },
                      "required": [
                        "fromVersion",
                        "toVersion",
                        "type"
                      ]
                    }
                  },
                  "required": [
                    "aggregateType",
                    "aggregateId",
                    "totalEvents",
                    "snapshot",
                    "events",
                    "nextCursor",
                    "filter"
                  ]
                }
              }
            }
          },
          "400": {
            "description": "Unknown aggregate type",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean"
                    },
                    "error": {
                      "type": "string"
                    },
                    "message": {
                      "type": "string"
                    }
                  },
                  "required": [
                    "success",
                    "error",
                    "message"
                  ]
                }
              }
            }
          },
          "401": {
            "description": "Missing or invalid authentication",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean"
                    },
                    "error": {
                      "type": "string"
                    },
                    "message": {
                      "type": "string"
                    }
                  },
                  "required": [
                    "success",
                    "error",
                    "message"
                  ]
                }
              }
            }
          },
          "403": {
            "description": "Invalid email domain",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean"
                    },
                    "error": {
                      "type": "string"
                    },
                    "message": {
                      "type": "string"
                    }
                  },
                  "required": [
                    "success",
                    "error",
                    "message"
                  ]
                }
              }
            }
          }
        }
      }
    },
