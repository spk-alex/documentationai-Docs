    "/admin/threedeye/users/{userId}/reset": {
      "post": {
        "tags": [
          "Admin",
          "3dEye"
        ],
        "summary": "Reset 3dEye provisioning for a user",
        "description": "Clears the local threedeye_users/recovery rows (force re-provision) and optionally deletes the remote 3dEye account when visible in our customer. Requires dual auth: X-Admin-API-Key + JWT.",
        "operationId": "post_ResetThreeDeyeUserRoute",
        "parameters": [
          {
            "schema": {
              "type": "string",
              "description": "b2c user UUID"
            },
            "required": true,
            "description": "b2c user UUID",
            "name": "userId",
            "in": "path"
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "clearMapping": {
                    "type": "boolean",
                    "default": true,
                    "description": "Delete the local threedeye_users + recovery rows so the next fetch re-provisions."
                  },
                  "deleteRemote": {
                    "type": "boolean",
                    "default": false,
                    "description": "Also delete the remote 3dEye account if it is visible in our customer. Cannot remove accounts that live outside our customer."
                  },
                  "reprovision": {
                    "type": "boolean",
                    "default": false,
                    "description": "After clearing, immediately re-run provisioning instead of waiting for the next fetch."
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Reset completed",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "userId": {
                      "type": "string"
                    },
                    "email": {
                      "type": [
                        "string",
                        "null"
                      ]
                    },
                    "clearedMapping": {
                      "type": "boolean"
                    },
                    "clearedRecovery": {
                      "type": "boolean"
                    },
                    "remote": {
                      "type": "object",
                      "properties": {
                        "attemptedDelete": {
                          "type": "boolean"
                        },
                        "deletedThreedeyeUserId": {
                          "type": [
                            "string",
                            "null"
                          ]
                        },
                        "notVisible": {
                          "type": "boolean"
                        }
                      },
                      "required": [
                        "attemptedDelete",
                        "deletedThreedeyeUserId",
                        "notVisible"
                      ]
                    },
                    "reprovision": {
                      "type": "object",
                      "properties": {
                        "attempted": {
                          "type": "boolean"
                        },
                        "threedeyeUserId": {
                          "type": [
                            "string",
                            "null"
                          ]
                        },
                        "error": {
                          "type": [
                            "string",
                            "null"
                          ]
                        }
                      },
                      "required": [
                        "attempted",
                        "threedeyeUserId",
                        "error"
                      ]
                    }
                  },
                  "required": [
                    "userId",
                    "email",
                    "clearedMapping",
                    "clearedRecovery",
                    "remote",
                    "reprovision"
                  ]
                }
              }
            }
          },
          "401": {
            "description": "Missing or invalid authentication",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean"
                    },
                    "error": {
                      "type": "string"
                    },
                    "message": {
                      "type": "string"
                    }
                  },
                  "required": [
                    "success",
                    "error",
                    "message"
                  ]
                }
              }
            }
          },
          "500": {
            "description": "Internal server error",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean"
                    },
                    "error": {
                      "type": "string"
                    },
                    "message": {
                      "type": "string"
                    }
                  },
                  "required": [
                    "success",
                    "error",
                    "message"
                  ]
                }
              }
            }
          }
        }
      }
    },
    "/collective-temp-keys/{uuid}/doors/{doorId}/open": {
      "post": {
        "tags": [
          "TempKey",
          "Collective",
          "Web"
        ],
        "summary": "Open a door via a collective key",
        "description": "Validates a collective access key (validity window) and opens the given door via the LockAggregate (same path as the single temp-key open flow).",
        "operationId": "post_OpenCollectiveDoorRoute",
        "parameters": [
          {
            "schema": {
              "type": "string",
              "description": "Collective temporary key UUID"
            },
            "required": true,
            "description": "Collective temporary key UUID",
            "name": "uuid",
            "in": "path"
          },
          {
            "schema": {
              "type": "integer",
              "exclusiveMinimum": 0,
              "description": "Door id within the collective key"
            },
            "required": true,
            "description": "Door id within the collective key",
            "name": "doorId",
            "in": "path"
          }
        ],
        "responses": {
          "303": {
            "description": "Door opened, redirecting to confirmation"
          },
          "400": {
            "description": "Credential is outside its validity window",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "error": {
                      "type": "string"
                    }
                  },
                  "required": [
                    "error"
                  ]
                }
              }
            }
          },
          "404": {
            "description": "Credential or door not found",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "error": {
                      "type": "string"
                    }
                  },
                  "required": [
                    "error"
                  ]
                }
              }
            }
          },
          "500": {
            "description": "Internal server error",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "error": {
                      "type": "string"
                    }
                  },
                  "required": [
                    "error"
                  ]
                }
              }
            }
          }
        }
      }
    },
    "/temp-keys/{uuid}/doors/{doorId}/open": {
      "post": {
        "tags": [
          "TempKey",
          "Web"
        ],
        "summary": "Open a specific door via a temp key",
        "description": "Validates a temporary key (revocation, expiration, usage limits, authorization) and opens the given door via its LockAggregate plus the Door Lock cluster UnlockDoor command to the device shadow.",
        "operationId": "post_OpenTempKeyDoorRoute",
        "parameters": [
          {
