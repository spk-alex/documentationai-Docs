                    "operations",
                    "auditLogPath",
                    "duration",
                    "errors"
                  ]
                }
              }
            }
          },
          "400": {
            "description": "Invalid mode parameter",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean"
