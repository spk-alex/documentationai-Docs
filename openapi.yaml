                                  ]
                                },
                                "matterPath": {
                                  "type": "string"
                                },
                                "deviceTypeId": {
                                  "type": "integer"
                                },
                                "rawValue": {
                                  "type": "number"
                                },
                                "timestamp": {
                                  "type": "string"
                                }
                              },
                              "required": [
